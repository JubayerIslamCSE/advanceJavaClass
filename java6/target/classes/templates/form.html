<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
</head>
<body>

  <h1>Product Form</h1>

  <form method="post" th:action="@{/product/add}" th:object="${product}">

    <label>Product ID</label>
    <input type="number" th:field="*{id}">
    <span th:errors="*{id}" style="color: #ff7c7c"></span>
    <br><br>

    <label>Product Name</label>
    <input type="text" th:field="*{name}">
    <span th:errors="*{name}" style="color: #fa52c5"></span>
    <br><br>

    <label>Product Category</label>
    <input type="text" th:field="*{category}">
    <span th:errors="*{category}" style="color: #ff8800"></span>
    <br><br>

    <label>Stock</label>
    <input type="number" th:field="*{stock}">
    <span th:errors="*{stock}" style="color: #007314"></span>
    <br><br>

    <label>Price</label>
    <input type="number" th:field="*{price}">
    <span th:errors="*{price}" style="color: #00155a"></span>
    <br><br>

    <button type="submit">Add Product</button>

  </form>

  <br><br>

  <a href="/product/list">Back to List</a>

</body>
</html>
